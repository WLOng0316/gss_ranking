<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GSS RANKING - WTT EDITION</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root { --blue: #00d4ff; --red: #ff3b3b; --bg: #030508; --card: #12161f; --line: #1c2230; --text: #e8edf5; --muted: #4e5b73; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; overflow-x: hidden; }
        
        /* WTT Header Style */
        header { padding: 60px 20px 10px; background: rgba(0,0,0,0.95); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px); border-bottom: 1px solid var(--line); }
        .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 900; font-style: italic; letter-spacing: -1px; }

        /* Multi-Category Filters */
        .filter-section { background: rgba(3,5,8,0.9); position: sticky; top: 96px; z-index: 99; border-bottom: 1px solid var(--line); padding: 8px 0; backdrop-filter: blur(10px); }
        .filter-row { display: flex; overflow-x: auto; padding: 4px 15px; gap: 8px; scrollbar-width: none; }
        .filter-row::-webkit-scrollbar { display: none; }
        .chip { padding: 6px 18px; border-radius: 20px; background: var(--line); color: var(--muted); font-size: 11px; font-weight: 800; white-space: nowrap; transition: 0.3s; text-transform: uppercase; border: 1px solid transparent; }
        .chip.active { background: var(--blue); color: #000; border-color: var(--blue); }

        /* Ranking Cards */
        .rank-list { padding: 15px 0; }
        .rank-card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; margin: 0 15px 10px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .rank-card:active { transform: scale(0.98); }
        .rank-num { width: 40px; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 20px; color: var(--muted); }
        .rank-num.top3 { color: var(--blue); text-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }
        .player-info { flex: 1; }
        .player-name { font-weight: 700; font-size: 16px; display: block; margin-bottom: 2px; }
        .player-meta { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .r-pts { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 900; color: var(--blue); text-align: right; }

        /* Bottom Sheet Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 500; display: none; align-items: flex-end; }
        .modal-content { width: 100%; background: #0a0e14; border-top: 3px solid var(--blue); border-radius: 25px 25px 0 0; max-height: 85vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); padding-bottom: 50px; }
        .modal-overlay.active { display: flex; }
        .modal-overlay.active .modal-content { transform: translateY(0); }

        /* Admin PIN View */
        #adminAuth { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 600; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .pin-dot-row { display: flex; gap: 15px; margin-bottom: 40px; }
        .pin-dot { width: 14px; height: 14px; border: 2px solid var(--line); border-radius: 50%; }
        .pin-dot.filled { background: var(--blue); border-color: var(--blue); box-shadow: 0 0 15px var(--blue); }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .key { width: 75px; height: 75px; border-radius: 50%; border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; background: rgba(255,255,255,0.02); }

        /* Common Form Elements */
        .wtt-input, .wtt-select { width: 100%; background: var(--card); border: 1px solid var(--line); color: #fff; padding: 15px; border-radius: 10px; margin-bottom: 12px; font-size: 15px; font-family: 'Barlow'; }
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(3,5,8,0.95); display: flex; border-top: 1px solid var(--line); padding: 15px 0 35px; z-index: 100; backdrop-filter: blur(15px); }
        .nav-tab { flex: 1; text-align: center; color: var(--muted); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .nav-tab.active { color: var(--blue); }
        .toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--blue); color: #000; padding: 10px 20px; border-radius: 25px; font-weight: 900; font-size: 12px; opacity: 0; transition: 0.3s; z-index: 1000; pointer-events: none; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<header>
    <div class="logo">GSS RANKING</div>
    <div id="statusLabel" style="font-family:'Share Tech Mono'; font-size:10px; color:var(--muted)">SYSTEM ONLINE</div>
</header>

<div id="filterArea" class="filter-section">
    <div class="filter-row" id="genderFilters">
        <div class="chip active" onclick="updateGender('all', this)">All Genders</div>
        <div class="chip" onclick="updateGender('Men', this)">Men</div>
        <div class="chip" onclick="updateGender('Women', this)">Women</div>
    </div>
    <div class="filter-row" id="catFilters">
        <div class="chip active" onclick="updateCat('all', this)">All Categories</div>
        <div class="chip" onclick="updateCat('U9', this)">U9</div>
        <div class="chip" onclick="updateCat('U12', this)">U12</div>
        <div class="chip" onclick="updateCat('U15', this)">U15</div>
        <div class="chip" onclick="updateCat('U19', this)">U19</div>
        <div class="chip" onclick="updateCat('Open', this)">Open</div>
    </div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div style="width: 40px; height: 4px; background: var(--line); border-radius: 2px; margin: 15px auto;"></div>
        <div id="modalBody"></div>
    </div>
</div>

<div id="adminAuth">
    <div style="color:var(--muted); font-weight:700; letter-spacing:3px; margin-bottom:20px; font-size:12px;">AUTHORIZATION REQUIRED</div>
    <div class="pin-dot-row">
        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="keypad">
        <script>for(let i=1;i<=9;i++) document.write(`<div class="key" onclick="pressKey('${i}')">${i}</div>`);</script>
        <div class="key" style="border:none; color:var(--red); font-size:14px" onclick="cancelAdmin()">ESC</div>
        <div class="key" onclick="pressKey('0')">0</div>
        <div class="key" style="border:none; color:var(--blue); font-size:14px" onclick="delPin()">DEL</div>
    </div>
</div>

<div id="pg-ranking" class="page active"><div id="rankList" class="rank-list"></div></div>
<div id="pg-events" class="page"><div id="eventList" class="rank-list"></div></div>
<div id="pg-coach" class="page">
    <div id="adminView" style="display:none; padding: 20px;">
        <div class="player-meta" style="margin-bottom:10px">Match Records</div>
        <select id="wSel" class="wtt-select"></select>
        <select id="lSel" class="wtt-select"></select>
        <button onclick="saveMatch()" style="width:100%; background:var(--blue); color:#000; border:none; padding:16px; border-radius:10px; font-weight:900; margin-bottom:30px;">SUBMIT RESULT</button>

        <div class="player-meta" style="margin-bottom:10px">Athlete Profiles</div>
        <input type="text" id="newName" class="wtt-input" placeholder="Enter Full Name">
        <select id="newGender" class="wtt-select">
            <option value="Men">Men</option>
            <option value="Women">Women</option>
        </select>
        <select id="newCat" class="wtt-select">
            <option value="Open">Open</option>
            <option value="U19">U19</option>
            <option value="U15">U15</option>
            <option value="U12">U12</option>
            <option value="U9">U9</option>
        </select>
        <button onclick="createPlayer()" style="width:100%; background:var(--text); color:#000; border:none; padding:15px; border-radius:10px; font-weight:900;">REGISTER ATHLETE</button>
        <div id="adminPlayerList" style="margin-top:20px"></div>
    </div>
</div>

<nav>
    <div class="nav-tab active" onclick="switchTab('ranking', this)">Ranking</div>
    <div class="nav-tab" onclick="switchTab('events', this)">Events</div>
    <div class="nav-tab" onclick="switchTab('coach', this)">Admin</div>
</nav>

<div class="toast" id="toast"></div>

<script>
// --- FIREBASE CONFIG (SAME AS YOUR ORIGINAL) ---
const firebaseConfig = {
    apiKey: "AIzaSyA3YGcigMzcLmnVXE6LrSRQWZ8IP7TRQBU",
    authDomain: "gss-ranking.firebaseapp.com",
    databaseURL: "https://gss-ranking-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "gss-ranking",
    storageBucket: "gss-ranking.firebasestorage.app",
    messagingSenderId: "975136802534",
    appId: "1:975136802534:web:11d41775792dc3d1fa5d27"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let players = [], logs = [], events = [], pinBuffer = "", isCoach = false;
let filterGender = 'all', filterCat = 'all';

function init() {
    db.ref('players').on('value', s => { 
        players = s.val() ? Object.values(s.val()) : []; 
        renderRanking(); 
        updateAdminSelects(); 
        renderAdminPlayerList(); 
    });
    db.ref('logs').on('value', s => { logs = s.val() ? Object.values(s.val()) : []; });
    db.ref('events').on('value', s => { 
        events = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []; 
        renderEvents(); 
    });
}

// --- FILTERING ---
function updateGender(val, el) {
    filterGender = val;
    document.querySelectorAll('#genderFilters .chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderRanking();
}

function updateCat(val, el) {
    filterCat = val;
    document.querySelectorAll('#catFilters .chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderRanking();
}

function renderRanking() {
    let list = [...players];
    if(filterGender !== 'all') list = list.filter(p => p.gender === filterGender);
    if(filterCat !== 'all') list = list.filter(p => p.category === filterCat);
    
    list.sort((a,b) => b.rating - a.rating);

    document.getElementById('rankList').innerHTML = list.map((p, i) => `
        <div class="rank-card" onclick="showPlayerDetail('${p.name}')">
            <div class="rank-num ${i < 3 ? 'top3' : ''}">${i + 1}</div>
            <div class="player-info">
                <span class="player-name">${p.name}</span>
                <span class="player-meta">${p.gender} | ${p.category}</span>
            </div>
            <div class="r-pts">${Math.round(p.rating)}</div>
        </div>
    `).join('') || `<div style="text-align:center; padding:50px; color:var(--muted)">No athletes found.</div>`;
}

// --- PLAYER DETAILS ---
function showPlayerDetail(name) {
    const p = players.find(x => x.name === name);
    const pLogs = logs.filter(l => l.w === name || l.l === name).reverse().slice(0, 10);
    
    let html = `
        <div style="padding:30px 20px;">
            <div class="player-meta" style="color:var(--blue)">Athlete Profile</div>
            <div style="font-size:32px; font-weight:900; margin:10px 0 20px;">${name}</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:30px;">
                <div style="background:var(--line); padding:15px; border-radius:12px; text-align:center;">
                    <div style="font-size:26px; font-weight:900; color:var(--blue)">${Math.round(p.rating)}</div>
                    <div class="player-meta" style="font-size:8px">World Rating</div>
                </div>
                <div style="background:var(--line); padding:15px; border-radius:12px; text-align:center;">
                    <div style="font-size:26px; font-weight:900;">${p.category}</div>
                    <div class="player-meta" style="font-size:8px">Division</div>
                </div>
            </div>
            <div class="player-meta" style="margin-bottom:15px">Recent Results</div>
            ${pLogs.map(m => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:15px; background:rgba(255,255,255,0.03); border-radius:10px; margin-bottom:8px; border-left:4px solid ${m.w === name ? 'var(--blue)' : 'var(--red)'}">
                    <div>
                        <div style="font-weight:700; font-size:14px;">vs ${m.w === name ? m.l : m.w}</div>
                        <div style="font-size:10px; color:var(--muted)">${new Date(m.ts).toLocaleDateString()}</div>
                    </div>
                    <div style="font-family:'Barlow Condensed'; font-weight:900; color:${m.w === name ? 'var(--blue)' : 'var(--red)'}">
                        ${m.w === name ? '+' : '-'}${m.diff}
                    </div>
                </div>
            `).join('')}
        </div>
    `;
    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('modalOverlay').classList.add('active');
}

// --- NAVIGATION & ADMIN ---
function switchTab(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
    document.getElementById('pg-' + id).classList.add('active');
    el.classList.add('active');
    
    // Toggle Category Filter
    document.getElementById('filterArea').style.display = (id === 'ranking') ? 'block' : 'none';
    
    if(id === 'coach' && !isCoach) {
        document.getElementById('adminAuth').style.display = 'flex';
        pinBuffer = ""; updateDots();
    }
}

function pressKey(n) {
    if(pinBuffer.length < 4) {
        pinBuffer += n; updateDots();
        if(pinBuffer === "8888") {
            isCoach = true;
            document.getElementById('adminAuth').style.display = 'none';
            document.getElementById('adminView').style.display = 'block';
            document.getElementById('statusLabel').textContent = "COACH MODE ACTIVE";
            document.getElementById('statusLabel').style.color = "var(--blue)";
        } else if(pinBuffer.length === 4) {
            showToast("INVALID PIN"); pinBuffer = ""; updateDots();
        }
    }
}
function updateDots() { document.querySelectorAll('.pin-dot').forEach((d, i) => d.classList.toggle('filled', i < pinBuffer.length)); }
function cancelAdmin() { document.getElementById('adminAuth').style.display = 'none'; switchTab('ranking', document.querySelector('.nav-tab')); }
function delPin() { pinBuffer = pinBuffer.slice(0, -1); updateDots(); }

// --- DATABASE OPERATIONS ---
function createPlayer() {
    const name = document.getElementById('newName').value.trim();
    if(!name) return;
    db.ref('players/' + name.replace(/\./g, '_')).set({
        name: name,
        gender: document.getElementById('newGender').value,
        category: document.getElementById('newCat').value,
        rating: 1000
    });
    document.getElementById('newName').value = "";
    showToast("ATHLETE PROFILE CREATED");
}

function saveMatch() {
    const wn = document.getElementById('wSel').value, ln = document.getElementById('lSel').value;
    if(!wn || !ln || wn === ln) return showToast("SELECT TWO DIFFERENT PLAYERS");
    
    const w = players.find(p => p.name === wn), l = players.find(p => p.name === ln);
    const diff = Math.round(32 * (1 - (1 / (1 + Math.pow(10, (l.rating - w.rating) / 400)))));
    
    db.ref('players/' + wn.replace(/\./g, '_')).update({ rating: w.rating + diff });
    db.ref('players/' + ln.replace(/\./g, '_')).update({ rating: l.rating - diff });
    db.ref('logs').push({ w: wn, l: ln, diff: diff, ts: Date.now() });
    showToast("RESULT SYNCED");
}

function renderEvents() {
    document.getElementById('eventList').innerHTML = events.slice().reverse().map(e => `
        <div class="rank-card">
            <div class="player-info">
                <span class="player-meta" style="color:var(--blue)">${e.date}</span>
                <span class="player-name" style="font-size:18px">${e.name}</span>
            </div>
            <div style="color:var(--muted)">→</div>
        </div>
    `).join('');
}

function renderAdminPlayerList() {
    document.getElementById('adminPlayerList').innerHTML = players.map(p => `
        <div style="display:flex; justify-content:space-between; padding:12px; background:var(--card); margin-bottom:8px; border-radius:10px; font-size:13px; border:1px solid var(--line);">
            <span>${p.name} <small style="color:var(--muted)">(${p.category})</small></span>
            <span style="color:var(--red); font-weight:700" onclick="if(confirm('Delete?')) db.ref('players/${p.name.replace(/\./g,'_')}').remove()">DEL</span>
        </div>
    `).join('');
}

function updateAdminSelects() {
    const options = players.map(p => `<option value="${p.name}">${p.name}</option>`).sort().join('');
    document.getElementById('wSel').innerHTML = `<option value="">Select Winner...</option>` + options;
    document.getElementById('lSel').innerHTML = `<option value="">Select Loser...</option>` + options;
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
function showToast(m) { 
    const t = document.getElementById('toast'); 
    t.textContent = m; t.classList.add('show'); 
    setTimeout(() => t.classList.remove('show'), 2000); 
}

init();
</script>
</body>
</html>
