<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GSS RANKING</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="GSS Ranking">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22GSS%20Ranking%22,%22short_name%22:%22GSS%22,%22start_url%22:%22index.html%22,%22display%22:%22standalone%22,%22background_color%22:%22%23030508%22,%22theme_color%22:%22%23030508%22}">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root { --blue: #00d4ff; --red: #ff3b3b; --bg: #030508; --card: #0b0d12; --line: #1c2230; --text: #e8edf5; --muted: #3a4558; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; -webkit-user-select: none; }
        
        /* Header & Nav */
        header { padding: 60px 20px 15px; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px); }
        .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 900; font-style: italic; letter-spacing: -1px; }
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(3,5,8,0.95); display: flex; border-top: 1px solid var(--line); padding: 15px 0 30px; z-index: 100; backdrop-filter: blur(15px); }
        .nav-tab { flex: 1; text-align: center; color: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .nav-tab.active { color: var(--blue); }

        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 通用样式 */
        .sec-title { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; padding: 20px; display: flex; align-items: center; gap: 10px; }
        .sec-title::after { content: ''; flex: 1; height: 1px; background: var(--line); }
        .form-wrap { padding: 0 20px; }
        .wtt-input, .wtt-select { width: 100%; background: var(--card); border: 1px solid var(--line); color: #fff; padding: 14px; border-radius: 8px; margin-bottom: 10px; font-size: 15px; }

        /* 九宫格密码锁样式 */
        #adminAuthLayer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pass-dots { display: flex; gap: 15px; margin-bottom: 40px; }
        .dot { width: 12px; height: 12px; border: 2px solid var(--muted); border-radius: 50%; transition: 0.2s; }
        .dot.filled { background: var(--blue); border-color: var(--blue); box-shadow: 0 0 10px var(--blue); }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .key { width: 70px; height: 70px; border-radius: 50%; border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; color: #fff; background: rgba(255,255,255,0.03); cursor: pointer; }
        .key:active { background: var(--blue); color: #000; }

        /* 比分录入网格 */
        .score-row { display: grid; grid-template-columns: 40px 1fr 1fr; gap: 10px; align-items: center; margin-bottom: 8px; }
        .set-label { font-size: 11px; color: var(--muted); font-weight: 700; }

        /* 列表卡片 */
        .rank-card { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 15px; margin: 0 20px 8px; display: flex; align-items: center; }
        .r-pts { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 900; color: var(--blue); margin-left: auto; }
        .match-card { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 15px; margin: 0 20px 10px; position: relative; }
        .del-x { position: absolute; right: 15px; top: 15px; color: var(--red); font-weight: bold; font-size: 18px; }
        
        .toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); background: var(--blue); color: #000; padding: 12px 25px; border-radius: 30px; font-weight: 900; opacity: 0; z-index: 1000; pointer-events: none; transition: 0.3s; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<header><div class="logo">GSS RANKING</div><div style="font-family:'Share Tech Mono'; font-size:10px; color:var(--muted)">SYSTEM V9.0</div></header>

<div id="adminAuthLayer" style="display:none;">
    <div style="margin-bottom: 20px; color: var(--muted); font-weight: 700; letter-spacing: 2px;">ENTER COACH PIN</div>
    <div class="pass-dots" id="passDots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="keypad">
        <div class="key" onclick="pressKey('1')">1</div><div class="key" onclick="pressKey('2')">2</div><div class="key" onclick="pressKey('3')">3</div>
        <div class="key" onclick="pressKey('4')">4</div><div class="key" onclick="pressKey('5')">5</div><div class="key" onclick="pressKey('6')">6</div>
        <div class="key" onclick="pressKey('7')">7</div><div class="key" onclick="pressKey('8')">8</div><div class="key" onclick="pressKey('9')">9</div>
        <div class="key" style="border:none; background:none; font-size:14px; color:var(--red)" onclick="clearPin()">ESC</div>
        <div class="key" onclick="pressKey('0')">0</div>
        <div class="key" style="border:none; background:none; font-size:14px; color:var(--blue)" onclick="delPin()">DEL</div>
    </div>
</div>

<div id="pg-ranking" class="page active">
    <div class="sec-title">Current Standings</div>
    <div id="rankList"></div>
</div>

<div id="pg-match" class="page">
    <div class="sec-title">Upload Result (BO5)</div>
    <div class="form-wrap">
        <select id="wSel" class="wtt-select"></select>
        <select id="lSel" class="wtt-select"></select>
        <div id="scoreInputs">
            <script>
                for(let i=1; i<=5; i++){
                    document.write(`
                        <div class="score-row">
                            <div class="set-label">SET ${i}</div>
                            <input type="number" id="s${i}w" class="wtt-input" placeholder="Winner" style="margin-bottom:0">
                            <input type="number" id="s${i}l" class="wtt-input" placeholder="Loser" style="margin-bottom:0">
                        </div>
                    `);
                }
            </script>
        </div>
        <button class="btn-primary" onclick="submitMatch()" style="width:100%; background:var(--blue); border:none; padding:18px; border-radius:8px; font-weight:900; margin-top:10px;">SUBMIT SCORE</button>
    </div>
    <div class="sec-title">Recent History</div>
    <div id="recentMatches"></div>
</div>

<div id="pg-coach" class="page">
    <div class="sec-title">Athlete Registration</div>
    <div class="form-wrap">
        <input type="text" id="newName" class="wtt-input" placeholder="Name">
        <select id="newGroup" class="wtt-select"><option value="Open">Open</option><option value="U18">U18</option><option value="U15">U15</option><option value="U12">U12</option></select>
        <button class="btn-primary" onclick="addPlayer()" style="width:100%; background:var(--blue); border:none; padding:15px; border-radius:8px; font-weight:900;">ADD PLAYER</button>
    </div>
    <div class="sec-title">Tournament Management</div>
    <div id="adminList"></div>
</div>

<nav>
    <div class="nav-tab active" onclick="tab('ranking', this)">Ranking</div>
    <div class="nav-tab" onclick="tab('match', this)">Match</div>
    <div class="nav-tab" onclick="tab('coach', this)">Admin</div>
</nav>

<div class="toast" id="toast"></div>

<script>
// --- FIREBASE CONFIG (保持不变) ---
const firebaseConfig = {
    apiKey: "AIzaSyA3YGcigMzcLmnVXE6LrSRQWZ8IP7TRQBU",
    authDomain: "gss-ranking.firebaseapp.com",
    databaseURL: "https://gss-ranking-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "gss-ranking",
    storageBucket: "gss-ranking.firebasestorage.app",
    messagingSenderId: "975136802534",
    appId: "1:975136802534:web:11d41775792dc3d1fa5d27"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const MASTER_PIN = "8888"; 
let players = [], logs = [], pinInput = "";

function initData() {
    db.ref('players').on('value', snap => {
        players = snap.val() ? Object.values(snap.val()) : [];
        renderRanking(); updateSelects(); renderAdmin();
    });
    db.ref('logs').on('value', snap => {
        logs = snap.val() ? Object.entries(snap.val()).map(([id, data]) => ({id, ...data})) : [];
        renderMatches();
    });
}

// --- 九宫格逻辑 ---
function pressKey(num) {
    if(pinInput.length < 4) {
        pinInput += num;
        updatePinDots();
        if(pinInput.length === 4) {
            setTimeout(() => {
                if(pinInput === MASTER_PIN) {
                    document.getElementById('adminAuthLayer').style.display = 'none';
                    toast("COACH ACCESS GRANTED");
                } else {
                    toast("INVALID PIN");
                    clearPin();
                }
            }, 200);
        }
    }
}
function updatePinDots() {
    const dots = document.querySelectorAll('.dot');
    dots.forEach((dot, i) => dot.classList.toggle('filled', i < pinInput.length));
}
function clearPin() { pinInput = ""; updatePinDots(); if(currentTab !== 'coach') document.getElementById('adminAuthLayer').style.display = 'none'; }
function delPin() { pinInput = pinInput.slice(0, -1); updatePinDots(); }

// --- 导航 ---
let currentTab = 'ranking';
function tab(id, el) {
    currentTab = id;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
    document.getElementById('pg-' + id).classList.add('active');
    el.classList.add('active');
    
    if(id === 'coach') {
        document.getElementById('adminAuthLayer').style.display = 'flex';
        clearPin();
    }
}

// --- 核心逻辑 ---
function submitMatch() {
    const wn = document.getElementById('wSel').value, ln = document.getElementById('lSel').value;
    if(!wn || !ln || wn === ln) return alert("Select players");

    let scores = [];
    for(let i=1; i<=5; i++) {
        let w = document.getElementById(`s${i}w`).value, l = document.getElementById(`s${i}l`).value;
        if(w !== "" && l !== "") scores.push(`${w}-${l}`);
    }
    const w = players.find(p => p.name === wn), l = players.find(p => p.name === ln);
    const diff = Math.round(32 * (1 - (1 / (1 + Math.pow(10, (l.rating - w.rating) / 400)))));
    
    db.ref('players/' + wn.replace(/\./g, '_')).update({ rating: w.rating + diff });
    db.ref('players/' + ln.replace(/\./g, '_')).update({ rating: l.rating - diff });
    db.ref('logs').push({ w: wn, l: ln, diff, score: scores.join(', '), ts: Date.now() });
    
    // Reset
    for(let i=1; i<=5; i++) { document.getElementById(`s${i}w`).value = ''; document.getElementById(`s${i}l`).value = ''; }
    toast("MATCH RECORDED");
}

function undoMatch(id) {
    let p = prompt("ENTER COACH PIN TO UNDO:");
    if(p !== MASTER_PIN) return;
    const m = logs.find(x => x.id === id);
    const w = players.find(p => p.name === m.w), l = players.find(p => p.name === m.l);
    if(w && l) {
        db.ref('players/' + m.w.replace(/\./g, '_')).update({ rating: w.rating - m.diff });
        db.ref('players/' + m.l.replace(/\./g, '_')).update({ rating: l.rating + m.diff });
    }
    db.ref('logs/' + id).remove();
}

function addPlayer() {
    const n = document.getElementById('newName').value.trim();
    if(!n) return;
    db.ref('players/' + n.replace(/\./g, '_')).set({ name: n, group: document.getElementById('newGroup').value, rating: 1000 });
    document.getElementById('newName').value = ""; toast("PLAYER REGISTERED");
}

// --- 渲染渲染 ---
function renderRanking() {
    const sorted = [...players].sort((a,b) => b.rating - a.rating);
    document.getElementById('rankList').innerHTML = sorted.map((p, i) => `
        <div class="rank-card">
            <div style="width:25px; color:var(--muted); font-weight:900;">${i+1}</div>
            <div><div style="font-weight:700;">${p.name}</div><div style="font-size:10px; color:var(--muted)">${p.group}</div></div>
            <div class="r-pts">${Math.round(p.rating)}</div>
        </div>`).join('');
}

function renderMatches() {
    document.getElementById('recentMatches').innerHTML = logs.slice().reverse().slice(0,8).map(m => `
        <div class="match-card">
            <div style="font-weight:700;">${m.w} <span style="color:var(--blue)">def.</span> ${m.l}</div>
            <div style="font-size:11px; color:var(--muted); margin-top:5px;">${m.score} | +${m.diff} PTS</div>
            <div class="del-x" onclick="undoMatch('${m.id}')">✕</div>
        </div>`).join('');
}

function renderAdmin() {
    document.getElementById('adminList').innerHTML = players.map(p => `
        <div class="match-card" style="display:flex; justify-content:space-between; align-items:center;">
            <span>${p.name}</span>
            <span style="color:var(--red); font-size:12px; font-weight:700;" onclick="if(confirm('Delete?')) db.ref('players/${p.name.replace(/\./g,'_')}').remove()">DELETE</span>
        </div>`).join('');
}

function updateSelects() {
    const h = '<option value="">SELECT ATHLETE</option>' + players.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
    document.getElementById('wSel').innerHTML = h; document.getElementById('lSel').innerHTML = h;
}

function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }

initData();
</script>
</body>
</html>
