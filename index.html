<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GSS RANKING - TOURNAMENT EDITION</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root { --blue: #00d4ff; --red: #ff3b3b; --bg: #030508; --card: #12161f; --line: #1c2230; --text: #e8edf5; --muted: #4e5b73; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        
        header { padding: 60px 20px 10px; background: rgba(0,0,0,0.95); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px); border-bottom: 1px solid var(--line); }
        .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 900; font-style: italic; }

        .filter-section { background: rgba(3,5,8,0.9); position: sticky; top: 96px; z-index: 99; border-bottom: 1px solid var(--line); padding: 8px 0; backdrop-filter: blur(10px); }
        .filter-row { display: flex; overflow-x: auto; padding: 4px 15px; gap: 8px; scrollbar-width: none; }
        .filter-row::-webkit-scrollbar { display: none; }
        .chip { padding: 6px 18px; border-radius: 20px; background: var(--line); color: var(--muted); font-size: 11px; font-weight: 800; white-space: nowrap; text-transform: uppercase; border: 1px solid transparent; }
        .chip.active { background: var(--blue); color: #000; border-color: var(--blue); }

        .rank-card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; margin: 0 15px 10px; display: flex; align-items: center; cursor: pointer; }
        .rank-num { width: 40px; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 20px; color: var(--muted); }
        .rank-num.top3 { color: var(--blue); }
        .r-pts { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 900; color: var(--blue); margin-left: auto; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); z-index: 500; display: none; align-items: flex-end; }
        .modal-content { width: 100%; background: #0a0e14; border-top: 3px solid var(--blue); border-radius: 25px 25px 0 0; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); padding-bottom: 50px; }
        .modal-overlay.active { display: flex; }
        .modal-overlay.active .modal-content { transform: translateY(0); }

        #adminAuth { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 600; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .pin-dot { width: 14px; height: 14px; border: 2px solid var(--line); border-radius: 50%; margin: 0 8px; }
        .pin-dot.filled { background: var(--blue); border-color: var(--blue); box-shadow: 0 0 15px var(--blue); }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .key { width: 70px; height: 70px; border-radius: 50%; border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; background: rgba(255,255,255,0.02); }

        .wtt-input, .wtt-select { width: 100%; background: var(--card); border: 1px solid var(--line); color: #fff; padding: 14px; border-radius: 10px; margin-bottom: 10px; font-size: 15px; font-family: 'Barlow'; }
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(3,5,8,0.95); display: flex; border-top: 1px solid var(--line); padding: 15px 0 35px; z-index: 100; backdrop-filter: blur(15px); }
        .nav-tab { flex: 1; text-align: center; color: var(--muted); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .nav-tab.active { color: var(--blue); }
        .toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--blue); color: #000; padding: 10px 20px; border-radius: 25px; font-weight: 900; font-size: 12px; opacity: 0; transition: 0.3s; z-index: 1000; pointer-events: none; }
        .toast.show { opacity: 1; }
        .page { display: none; }
        .page.active { display: block; }

        /* Fixture Styles */
        .fixture-box { border-left: 3px solid var(--blue); background: rgba(255,255,255,0.03); padding: 12px; margin-bottom: 8px; border-radius: 4px; display: flex; justify-content: space-between; font-size: 14px; }
        .reg-list-item { padding: 8px 12px; background: var(--line); border-radius: 6px; display: inline-block; margin: 4px; font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>

<header><div class="logo">GSS RANKING</div><div id="statusLabel" style="font-family:'Share Tech Mono'; font-size:10px; color:var(--muted)">v16.0 LIVE</div></header>

<div id="filterArea" class="filter-section">
    <div class="filter-row">
        <div class="chip active" id="g-all" onclick="setGender('all', this)">All</div>
        <div class="chip" onclick="setGender('Men', this)">Men</div>
        <div class="chip" onclick="setGender('Women', this)">Women</div>
    </div>
    <div class="filter-row">
        <div class="chip active" id="c-all" onclick="setCat('all', this)">All Categories</div>
        <div class="chip" onclick="setCat('U9', this)">U9</div>
        <div class="chip" onclick="setCat('U12', this)">U12</div>
        <div class="chip" onclick="setCat('U15', this)">U15</div>
        <div class="chip" onclick="setCat('U19', this)">U19</div>
        <div class="chip" onclick="setCat('Open', this)">Open</div>
    </div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()"><div id="modalBody"></div></div>
</div>

<div id="adminAuth">
    <div style="display:flex; margin-bottom:30px;"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
    <div class="keypad">
        <script>for(let i=1;i<=9;i++) document.write(`<div class="key" onclick="pressKey('${i}')">${i}</div>`);</script>
        <div class="key" style="border:none; color:var(--red); font-size:14px" onclick="cancelAdmin()">ESC</div>
        <div class="key" onclick="pressKey('0')">0</div>
        <div class="key" style="border:none; color:var(--blue); font-size:14px" onclick="delPin()">DEL</div>
    </div>
</div>

<div id="pg-ranking" class="page active"><div id="rankList"></div></div>
<div id="pg-events" class="page"><div id="eventList"></div></div>
<div id="pg-coach" class="page">
    <div id="adminView" style="display:none; padding: 20px;">
        <div style="font-size:11px; color:var(--muted); margin-bottom:10px;">TOURNAMENT MANAGEMENT</div>
        <input type="text" id="evName" class="wtt-input" placeholder="Tournament Name">
        <input type="date" id="evDate" class="wtt-input">
        <button onclick="createEvent()" style="width:100%; background:var(--blue); color:#000; border:none; padding:15px; border-radius:10px; font-weight:900; margin-bottom:30px;">HOST NEW EVENT</button>

        <div style="font-size:11px; color:var(--muted); margin-bottom:10px;">QUICK SCORE ENTRY</div>
        <select id="wSel" class="wtt-select"></select>
        <select id="lSel" class="wtt-select"></select>
        <button onclick="saveMatch()" style="width:100%; background:var(--text); color:#000; border:none; padding:15px; border-radius:10px; font-weight:900; margin-bottom:30px;">SUBMIT SCORE</button>
        
        <div style="font-size:11px; color:var(--muted); margin-bottom:10px;">ATHLETE REGISTRY (CLICK TO EDIT)</div>
        <div id="adminPlayerList"></div>
    </div>
</div>

<nav>
    <div class="nav-tab active" onclick="tab('ranking', this)">Ranking</div>
    <div class="nav-tab" onclick="tab('events', this)">Events</div>
    <div class="nav-tab" onclick="tab('coach', this)">Coach</div>
</nav>
<div class="toast" id="toast"></div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA3YGcigMzcLmnVXE6LrSRQWZ8IP7TRQBU",
    authDomain: "gss-ranking.firebaseapp.com",
    databaseURL: "https://gss-ranking-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "gss-ranking",
    storageBucket: "gss-ranking.firebasestorage.app",
    messagingSenderId: "975136802534",
    appId: "1:975136802534:web:11d41775792dc3d1fa5d27"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let players = [], logs = [], events = [], pin = "", isCoach = false;
let curG = 'all', curC = 'all';

function init() {
    db.ref('players').on('value', s => { 
        players = s.val() ? Object.values(s.val()) : []; 
        renderRanking(); updateSelects(); renderAdminList(); 
    });
    db.ref('logs').on('value', s => { logs = s.val() ? Object.values(s.val()) : []; });
    db.ref('events').on('value', s => { 
        const val = s.val();
        events = val ? Object.entries(val).map(([id, d]) => ({id, ...d})) : []; 
        renderEvents(); 
    });
}

// --- EVENT SYSTEM ---
function renderEvents() {
    document.getElementById('eventList').innerHTML = events.slice().reverse().map(e => `
        <div class="rank-card" onclick="showEventDetail('${e.id}')">
            <div>
                <div style="color:var(--blue); font-size:10px; font-family:'Share Tech Mono'">${e.date || 'UPCOMING'}</div>
                <div style="font-weight:900; font-size:20px">${e.name}</div>
                <div style="font-size:11px; color:var(--muted); margin-top:5px;">Participants: ${e.regs ? Object.keys(e.regs).length : 0}</div>
            </div>
            <div style="margin-left:auto; color:var(--muted)">REGISTER →</div>
        </div>
    `).join('') || '<div style="text-align:center; padding:50px; color:var(--muted)">No active tournaments.</div>';
}

function showEventDetail(id) {
    const e = events.find(x => x.id === id);
    const regArray = e.regs ? Object.values(e.regs) : [];
    
    document.getElementById('modalBody').innerHTML = `
        <div style="padding:30px">
            <div style="color:var(--blue); font-size:10px; letter-spacing:2px">TOURNAMENT PORTAL</div>
            <div style="font-size:32px; font-weight:900; margin:5px 0 20px">${e.name}</div>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:30px">
                <div style="background:var(--line); padding:15px; border-radius:12px; text-align:center">
                    <div style="font-size:20px; font-weight:900">${regArray.length}</div>
                    <div style="font-size:10px; color:var(--muted)">PLAYERS</div>
                </div>
                <div style="background:var(--line); padding:15px; border-radius:12px; text-align:center">
                    <div style="font-size:20px; font-weight:900">${e.date || 'TBA'}</div>
                    <div style="font-size:10px; color:var(--muted)">DATE</div>
                </div>
            </div>

            <div style="margin-bottom:25px">
                <div style="font-size:11px; color:var(--muted); margin-bottom:10px">PLAYER REGISTRATION</div>
                <select id="regPlayerSelect" class="wtt-select">
                    <option value="">Choose Player...</option>
                    ${players.map(p => `<option value="${p.name}">${p.name} (${p.category})</option>`).join('')}
                </select>
                <button onclick="registerForEvent('${e.id}')" style="width:100%; background:var(--blue); color:#000; border:none; padding:15px; border-radius:10px; font-weight:900;">CONFIRM REGISTRATION</button>
            </div>

            <div style="margin-bottom:25px">
                <div style="font-size:11px; color:var(--muted); margin-bottom:10px">REGISTERED LIST</div>
                <div style="max-height:150px; overflow-y:auto; background:rgba(0,0,0,0.3); padding:10px; border-radius:10px;">
                    ${regArray.map(r => `<span class="reg-list-item">${r}</span>`).join('') || '<div style="font-size:12px; color:var(--muted)">No registrations yet.</div>'}
                </div>
            </div>

            <div style="margin-bottom:25px">
                <div style="font-size:11px; color:var(--muted); margin-bottom:10px">TOURNAMENT FIXTURES</div>
                <div id="fixturesArea">
                    ${e.fixtures ? e.fixtures.map(f => `
                        <div class="fixture-box">
                            <span style="font-weight:700">${f.p1}</span>
                            <span style="color:var(--muted)">vs</span>
                            <span style="font-weight:700">${f.p2}</span>
                        </div>
                    `).join('') : '<div style="font-size:12px; color:var(--muted)">Bracket not generated yet.</div>'}
                </div>
                ${isCoach && regArray.length >= 2 ? `<button onclick="generateFixtures('${e.id}')" style="margin-top:15px; width:100%; background:none; border:1px solid var(--blue); color:var(--blue); padding:10px; border-radius:8px; font-size:12px; font-weight:700;">ADMIN: GENERATE BRACKET</button>` : ''}
            </div>

            ${isCoach ? `<button onclick="if(confirm('Delete Event?')) db.ref('events/${e.id}').remove(); closeModal();" style="width:100%; background:none; color:var(--red); border:1px solid var(--red); padding:12px; border-radius:10px; margin-top:20px; font-weight:700;">DELETE TOURNAMENT</button>` : ''}
        </div>
    `;
    document.getElementById('modalOverlay').classList.add('active');
}

function registerForEvent(evId) {
    const pName = document.getElementById('regPlayerSelect').value;
    if(!pName) return toast("Select a player first");
    
    // 检查是否已报名
    const e = events.find(x => x.id === evId);
    if(e.regs && Object.values(e.regs).includes(pName)) return toast("Already registered");

    db.ref(`events/${evId}/regs`).push(pName).then(() => {
        toast("REGISTRATION SUCCESS");
        showEventDetail(evId); // 刷新详情
    });
}

function generateFixtures(evId) {
    const e = events.find(x => x.id === evId);
    const players = Object.values(e.regs);
    const shuffled = players.sort(() => 0.5 - Math.random());
    const fixtures = [];
    
    for (let i = 0; i < shuffled.length; i += 2) {
        if (shuffled[i + 1]) {
            fixtures.push({ p1: shuffled[i], p2: shuffled[i + 1] });
        } else {
            fixtures.push({ p1: shuffled[i], p2: "BYE" });
        }
    }
    
    db.ref(`events/${evId}/fixtures`).set(fixtures).then(() => {
        toast("FIXTURES GENERATED");
        showEventDetail(evId);
    });
}

// --- CORE ---
function renderRanking() {
    let list = players.filter(p => (curG==='all' || (p.gender||'Men')===curG) && (curC==='all' || (p.category||'Open')===curC)).sort((a,b)=>b.rating-a.rating);
    document.getElementById('rankList').innerHTML = list.map((p,i)=>`
        <div class="rank-card" onclick="showDetail('${p.name}')">
            <div class="rank-num ${i<3?'top3':''}">${i+1}</div>
            <div><div style="font-weight:700">${p.name}</div><div style="font-size:10px; color:var(--muted)">${p.gender||'Men'} | ${p.category||'Open'}</div></div>
            <div class="r-pts">${Math.round(p.rating)}</div>
        </div>
    `).join('') || '<div style="text-align:center; padding:50px; color:var(--muted)">No records.</div>';
}

function createEvent() {
    const n = document.getElementById('evName').value.trim();
    const d = document.getElementById('evDate').value;
    if(!n) return toast("Name needed");
    db.ref('events').push({ name:n, date:d, status:'open' }).then(() => {
        document.getElementById('evName').value = ""; toast("EVENT LIVE");
    });
}

function editPlayer(name) {
    const p = players.find(x => x.name === name);
    document.getElementById('modalBody').innerHTML = `
        <div style="padding:25px;">
            <div style="font-weight:900; margin-bottom:20px; color:var(--blue)">ATHLETE MANAGEMENT</div>
            <input type="text" id="editName" class="wtt-input" value="${p.name}">
            <select id="editGender" class="wtt-select"><option value="Men" ${p.gender==='Men'?'selected':''}>Men</option><option value="Women" ${p.gender==='Women'?'selected':''}>Women</option></select>
            <select id="editCat" class="wtt-select">${['Open','U19','U15','U12','U9'].map(c=>`<option value="${c}" ${(p.category||'Open')===c?'selected':''}>${c}</option>`).join('')}</select>
            <input type="number" id="editRating" class="wtt-input" value="${Math.round(p.rating)}">
            <button onclick="updatePlayer('${name.replace(/\./g,'_')}')" style="width:100%; background:var(--blue); border:none; padding:15px; border-radius:10px; font-weight:900;">UPDATE</button>
            <button onclick="if(confirm('Delete?')) { db.ref('players/${name.replace(/\./g,'_')}').remove(); closeModal(); }" style="width:100%; background:none; border:1px solid var(--red); color:var(--red); padding:10px; margin-top:10px; border-radius:10px;">DELETE PLAYER</button>
        </div>
    `;
    document.getElementById('modalOverlay').classList.add('active');
}

function updatePlayer(oldKey) {
    const newName = document.getElementById('editName').value.trim();
    const data = { name: newName, gender: document.getElementById('editGender').value, category: document.getElementById('editCat').value, rating: parseFloat(document.getElementById('editRating').value) };
    if(newName.replace(/\./g,'_') !== oldKey) db.ref('players/' + oldKey).remove();
    db.ref('players/' + newName.replace(/\./g,'_')).update(data);
    closeModal(); toast("PLAYER SYNCED");
}

function tab(id, el) {
    document.querySelectorAll('.page, .nav-tab').forEach(x => x.classList.remove('active'));
    document.getElementById('pg-'+id).classList.add('active'); el.classList.add('active');
    document.getElementById('filterArea').style.display = (id==='ranking'?'block':'none');
    if(id==='coach' && !isCoach) { document.getElementById('adminAuth').style.display='flex'; pin=""; dots(); }
}

function pressKey(n) {
    if(pin.length<4) { pin+=n; dots(); if(pin==="8888") { isCoach=true; document.getElementById('adminAuth').style.display='none'; document.getElementById('adminView').style.display='block'; } else if(pin.length===4) { toast("LOCKED"); pin=""; dots(); } }
}
function dots() { document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled', i<pin.length)); }
function cancelAdmin() { document.getElementById('adminAuth').style.display='none'; tab('ranking', document.querySelector('.nav-tab')); }
function delPin() { pin=pin.slice(0,-1); dots(); }

function saveMatch() {
    const wn=document.getElementById('wSel').value, ln=document.getElementById('lSel').value;
    if(!wn || !ln || wn===ln) return toast("SELECT 2 PLAYERS");
    const w=players.find(p=>p.name===wn), l=players.find(p=>p.name===ln);
    const diff = Math.round(32 * (1 - (1 / (1 + Math.pow(10, (l.rating-w.rating)/400)))));
    db.ref('players/'+wn.replace(/\./g,'_')).update({rating:w.rating+diff});
    db.ref('players/'+ln.replace(/\./g,'_')).update({rating:l.rating-diff});
    db.ref('logs').push({w:wn, l:ln, diff, ts:Date.now()});
    toast("SCORE SAVED");
}

function renderAdminList() {
    document.getElementById('adminPlayerList').innerHTML = players.map(p => `
        <div onclick="editPlayer('${p.name}')" style="display:flex; justify-content:space-between; padding:12px; background:var(--card); margin-bottom:8px; border-radius:10px; font-size:13px; border:1px solid var(--line);">
            <span>${p.name} <small style="color:var(--muted)">(${p.category||'Open'})</small></span>
            <span style="color:var(--blue)">EDIT</span>
        </div>
    `).join('');
}

function showDetail(name) {
    const p = players.find(x => x.name === name);
    const pLogs = logs.filter(l => l.w === name || l.l === name).reverse().slice(0,8);
    document.getElementById('modalBody').innerHTML = `
        <div style="padding:30px">
            <div style="font-size:28px; font-weight:900">${name}</div>
            <div style="color:var(--blue); font-size:12px; margin-bottom:20px">${p.gender||'Men'} | ${p.category||'Open'}</div>
            <div style="background:var(--line); padding:20px; border-radius:15px; text-align:center; margin-bottom:20px">
                <div style="font-size:35px; font-weight:900; color:var(--blue)">${Math.round(p.rating)}</div>
                <div style="font-size:10px; color:var(--muted)">RATING</div>
            </div>
            ${pLogs.map(m=>`<div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid rgba(255,255,255,0.05)">
                <span>vs ${m.w===name?m.l:m.w}</span>
                <span style="font-weight:900; color:${m.w===name?'var(--blue)':'var(--red)'}">${m.w===name?'+':''}${m.diff}</span>
            </div>`).join('')}
        </div>`;
    document.getElementById('modalOverlay').classList.add('active');
}

function setGender(v, el) { curG = v; document.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); renderRanking(); }
function setCat(v, el) { curC = v; document.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); renderRanking(); }

function updateSelects() {
    const o = [...players].sort((a,b)=>a.name.localeCompare(b.name)).map(p=>`<option value="${p.name}">${p.name}</option>`).join('');
    document.getElementById('wSel').innerHTML = '<option value="">Winner...</option>'+o;
    document.getElementById('lSel').innerHTML = '<option value="">Loser...</option>'+o;
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
function toast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

init();
</script>
</body>
</html>
